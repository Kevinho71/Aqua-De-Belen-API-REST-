# Configuración de producción para Coolify
# Usa la URL interna de PostgreSQL en Coolify (hostname del contenedor)

# Base de datos - URL interna de Coolify
spring.datasource.url=jdbc:postgresql://gcgw40ccwwk0s4kwoksg0cg8:5432/aqua_de_belen
spring.datasource.username=Kevin
spring.datasource.password=TRICAMPEON#123
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP - Pool de conexiones optimizado para producción
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate - NO crear ni modificar tablas en producción
spring.jpa.hibernate.ddl-auto=none
spring.jpa.generate-ddl=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Liquibase - Gestión de migraciones de BD
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# SpringDoc OpenAPI - Documentación API
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.root=INFO
logging.level.com.perfumeria.aquadebelen=INFO
logging.level.org.springframework.web=INFO

# Server
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-stacktrace=never
